name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    branches:
      - 'copilot/**'
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json
  pull_request:
    branches:
      - 'copilot/**'
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
